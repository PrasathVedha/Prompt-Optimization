<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="triangleGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#00BCD4"/>
    </linearGradient>
    <linearGradient id="triangleGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800"/>
      <stop offset="100%" style="stop-color:#FF5722"/>
    </linearGradient>
  </defs>
  
  <!-- Logo Triangles -->
  <polygon points="50,50 150,50 100,150" fill="url(#triangleGradient1)"/>
  <polygon points="75,75 175,75 125,175" fill="url(#triangleGradient2)"/>
  
  <!-- Stylized Text -->
  <text x="200" y="100" font-family="Arial Black, sans-serif" font-size="60" font-weight="bold">
    <tspan>⚡</tspan>
    <tspan dx="10">ℙ𝕣𝕠𝕞𝕡𝕥 𝕏</tspan>
    <tspan dx="10">⚡</tspan>
  </text>
  
  <!-- Slogan -->
