<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard - PromptX</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='prompt-visualizer.css') }}">
    <script src="{{ url_for('static', filename='prompt-visualizer.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }
        .nav-menu {
            width: 250px;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
        }
        .nav-menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .nav-menu a:hover, .nav-menu a.active {
            background: rgba(255, 255, 255, 0.1);
        }
        .content {
            flex: 1;
            padding: 20px;
        }
        .section {
            display: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .section.active {
            display: block;
        }
        .generate-form {
            max-width: 600px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: white;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.6);
            color: #00ffcc;
        }
        .btn-generate {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .btn-generate:hover {
            background: #45a049;
        }
        .dashboard-container {
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: row;
        }
        .sidebar {
            width: 250px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            position: fixed;
            left: 0;
            top: 0;
            overflow-y: auto;
            z-index: 1;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            margin-left: 250px;
            width: calc(100% - 250px);
            height: 100vh;
            position: relative;
            z-index: 0;
        }
        .generated-image {
            margin-top: 20px;
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }
        .download-btn {
            display: inline-block;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 4px;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .download-btn:hover {
            background: #45a049;
        }
        .profile-section {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        .profile-photo {
            text-align: center;
        }
        .profile-photo img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-bottom: 10px;
        }
        .history-section {
            margin-top: 20px;
        }
        .credits-section {
            text-align: center;
        }
        .credits-display {
            font-size: 2em;
            margin: 20px 0;
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="dashboard-container">
        <nav class="nav-menu">
            <h2 class="title">■ Prompt<span>X</span> ■</h2>
            <a href="#" class="active" onclick="showSection('home')">Home</a>
            <a href="#" onclick="showSection('profile')">Profile</a>
            <a href="#" onclick="showSection('credits')">Credits</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </nav>

        <div class="content">
            <div id="home" class="section active">
                <div class="generate-form">
                    <h2>Generate Image</h2>
                    <form action="{{ url_for('user.generate_image') }}" method="POST">
                        <div class="form-group">
                            <label for="prompt">Text Prompt</label>
                            <textarea id="prompt" name="prompt" rows="4" required></textarea>
                            <div id="prompt-visualization" class="prompt-visualization-container"></div>
                        <div class="form-group">
                            <label for="style">Style</label>
                            <select id="style" name="style" class="style-dropdown" required>
                                <option value="none">None</option>
                                <option value="realistic">Realistic</option>
                                <option value="cartoon">Cartoon</option>
                                <option value="anime">Anime</option>
                                <option value="watercolor">Watercolor</option>
                                <option value="oil_painting">Oil Painting</option>
                                <option value="digital_art">Digital Art</option>
                                <option value="minimalist">Minimalist</option>
                                <option value="abstract">Abstract</option>
                            </select>
                        </div>
                        </div>
                        <button type="submit" class="btn-generate">Generate Image</button>
                    </form>
                    <div class="generated-image">
                        {% if generated_image %}
                        <img src="{{ generated_image }}" alt="Generated Image" style="max-width: 100%; height: auto; margin-top: 20px;">
                        <br>
                        <a href="{{ generated_image }}" download class="download-btn">Download Image</a>
                        {% endif %}
                    </div>
                </div>
            </div>

            <div id="profile" class="section">
                <div class="profile-section">
                    <div class="profile-photo">
                        <svg class="user-logo" width="150" height="150" viewBox="0 0 150 150">
                            <circle cx="75" cy="75" r="70" fill="#4CAF50" />
                            <text x="75" y="95" font-size="60" fill="white" text-anchor="middle">{{ username[0] | upper }}</text>
                        </svg>
                    </div>
                    <div class="profile-info">
                        <h2>Profile Information</h2>
                        <form action="{{ url_for('user.update_profile') }}" method="POST">
                            <div class="form-group">
                                <label for="username">Username</label>
                                <input type="text" id="username" name="username" value="{{ username }}" required>
                            </div>
                            <button type="submit" class="btn-generate">Update Profile</button>
                        </form>
                        <div class="history-section">
                            <h3>Generation History</h3>
                            <div class="history-list">
                                {% for item in history %}
                                <div class="history-item">
                                    <img src="{{ item.image }}" alt="Generated Image">
                                    <p>{{ item.prompt }}</p>
                                    <small>{{ item.timestamp }}</small>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="credits" class="section">
                <div class="credits-section">
                    <h2>Your Credits</h2>
                    <div class="credits-display">{{ credits }}</div>
                    <form action="{{ url_for('user.request_credits') }}" method="POST">
                        <div class="form-group">
                            <label for="amount">Amount of Credits</label>
                            <input type="number" id="amount" name="amount" min="1" required>
                        </div>
                        <button type="submit" class="btn-generate">Request Credits</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.nav-menu a').forEach(link => {
                link.classList.remove('active');
            });
            document.getElementById(sectionId).classList.add('active');
            document.querySelector(`.nav-menu a[onclick="showSection('${sectionId}')"]`).classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const visualizer = new PromptVisualizer('prompt-visualization');
            const promptInput = document.getElementById('prompt');
            let visualizationTimeout;

            promptInput.addEventListener('input', function() {
                clearTimeout(visualizationTimeout);
                visualizationTimeout = setTimeout(() => {
                    visualizer.visualizePrompt(this.value);
                }, 500);
            });
        });

        particlesJS('particles-js', {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: '#ffffff' },
                shape: { type: 'circle' },
                opacity: { value: 0.5, random: false },
                size: { value: 3, random: true },
                line_linked: { enable: true, distance: 150, color: '#ffffff', opacity: 0.4, width: 1 },
                move: { enable: true, speed: 6, direction: 'none', random: false, straight: false, out_mode: 'out', bounce: false }
            },
            interactivity: {
                detect_on: 'canvas',
                events: { onhover: { enable: true, mode: 'repulse' }, onclick: { enable: true, mode: 'push' }, resize: true },
                modes: { repulse: { distance: 100, duration: 0.4 }, push: { particles_nb: 4 } }
            },
            retina_detect: true
        });
    </script>
</body>
</html>
